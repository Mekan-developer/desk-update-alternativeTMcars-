                        type: integer
                        example: 66
                      last_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 7
                      total:
                        type: integer
                        example: 0
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: 'http://192.168.31.64:8000/api/v1/videos?page=1'
                      last:
                        type: string
                        example: 'http://192.168.31.64:8000/api/v1/videos?page=1'
                      prev:
                        type: string
                        example: 'http://192.168.31.64:8000/api/v1/videos?page=65'
                      next:
                        type: string
                        example: null
                        nullable: true
