    get:
      summary: 'Публичная выдача одобренных объявлений.'
      operationId: ''
      description: "GET /api/v1/listings\n\nФильтры: search, category_id (включая подкатегории), region_id, city_id,\ntype (goods|services), price_min, price_max,\nsort (latest|price_asc|price_desc|nearest + lat/lng), page, limit."
