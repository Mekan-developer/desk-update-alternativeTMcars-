    get:
      summary: 'Публичная вертикальная лента одобренных роликов (ТЗ §7, экран 9).'
      operationId: '79'
      description: "GET /api/v1/videos\n\nФильтры: search (по названию), tag, page, limit.\nС Bearer-токеном у каждого ролика появляется is_liked."
