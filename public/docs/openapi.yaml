                    first: 'http://192.168.31.64:8000/api/v1/videos?page=1'
                    last: 'http://192.168.31.64:8000/api/v1/videos?page=1'
                    prev: 'http://192.168.31.64:8000/api/v1/videos?page=65'
                    next: null
