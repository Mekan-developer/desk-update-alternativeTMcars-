openapi: 3.0.3
info:
  title: 'Desc API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://192.168.31.64:8000'
tags:
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Токен выдаётся эндпоинтом `POST /auth/verify` (Sanctum personal access token). Передавайте его в заголовке `Authorization: Bearer {token}`.'
security:
  -
    default: []
paths:
  /api/health:
    get:
      summary: ''
      operationId: getApiHealth
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: ok
                properties:
                  status:
                    type: string
                    example: ok
      tags:
        - Endpoints
      security: []
  /api/v1/auth/send-code:
    post:
      summary: 'Запрос SMS-кода (регистрация и вход — единый сценарий).'
      operationId: SMS
      description: 'POST /api/v1/auth/send-code'
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 'Must match the regex /^\+?\d{8,15}$/.'
                  example: '6425593142326'
              required:
                - phone
      security: []
  /api/v1/auth/verify:
    post:
      summary: 'Проверка кода: новый номер регистрируется, существующий входит.'
      operationId: ''
      description: 'POST /api/v1/auth/verify'
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 'Must match the regex /^\+?\d{8,15}$/.'
                  example: '6425593142326'
                code:
                  type: string
                  description: ''
                  example: architecto
                fcm_token:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                  nullable: true
              required:
                - phone
                - code
      security: []
  /api/v1/auth/logout:
    post:
      summary: 'Отзыв текущего токена.'
      operationId: ''
      description: 'POST /api/v1/auth/logout'
      parameters: []
      responses: {  }
      tags:
        - Endpoints
  /api/v1/profile:
    get:
      summary: 'Текущий профиль.'
      operationId: ''
      description: 'GET /api/v1/profile'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация'
      tags:
        - Endpoints
    put:
      summary: 'Частичное обновление профиля (имя, пол, дата рождения, регион, город).'
      operationId: ''
      description: 'PUT /api/v1/profile'
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Длина value не должна превышать 255 символов.'
                  example: b
                  nullable: true
                gender:
                  type: string
                  description: ''
                  example: male
                  enum:
                    - male
                    - female
                  nullable: true
                birth_date:
                  type: string
                  description: 'Поле value должно быть корректной датой. Поле value должно быть датой раньше <code>today</code>.'
                  example: '2022-08-04'
                  nullable: true
                region_id:
                  type: string
                  description: 'Must match an existing stored value.'
                  example: null
                  nullable: true
                city_id:
                  type: string
                  description: 'Must match an existing stored value.'
                  example: null
                  nullable: true
                fcm_token:
                  type: string
                  description: 'Длина value не должна превышать 255 символов.'
                  example: 'n'
                  nullable: true
