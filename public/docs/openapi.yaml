                  nullable: true
                limit:
                  type: integer
                  description: 'Значение value должно быть не менее 1. Значение value не должно превышать 50.'
                  example: 7
                  nullable: true
                page:
                  type: integer
                  description: 'Значение value должно быть не менее 1.'
