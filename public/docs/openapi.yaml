      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Выбранное значение регион недопустимо.'
                  errors:
                    region_id:
                      - 'Выбранное значение регион недопустимо.'
                properties:
                  message:
                    type: string
                    example: 'Выбранное значение регион недопустимо.'
                  errors:
                    type: object
                    properties:
                      region_id:
                        type: array
                        example:
                          - 'Выбранное значение регион недопустимо.'
                        items:
                          type: string
      tags:
        - Endpoints
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                  description: 'Длина value не должна превышать 100 символов.'
                  example: b
                  nullable: true
                category_id:
                  type: integer
                  description: 'Must match an existing stored value.'
                  example: 16
                  nullable: true
                region_id:
                  type: integer
                  description: 'Must match an existing stored value.'
                  example: 16
                  nullable: true
                city_id:
                  type: integer
                  description: 'Must match an existing stored value.'
                  example: 16
                  nullable: true
                type:
                  type: string
                  description: ''
                  example: goods
                  enum:
                    - goods
                    - services
                  nullable: true
                price_min:
                  type: number
                  description: 'Значение value должно быть не менее 0.'
                  example: 39
                  nullable: true
                price_max:
                  type: number
                  description: 'Значение value должно быть не менее 0.'
                  example: 84
                  nullable: true
                sort:
                  type: string
                  description: ''
                  example: nearest
                  enum:
                    - latest
                    - price_asc
                    - price_desc
                    - nearest
                  nullable: true
                lat:
                  type: number
                  description: 'This field is required when <code>sort</code> is <code>nearest</code>. Значение value должно быть между -90 и 90.'
                  example: -89
                  nullable: true
                lng:
                  type: number
                  description: 'This field is required when <code>sort</code> is <code>nearest</code>. Значение value должно быть между -180 и 180.'
                  example: -180
                  nullable: true
                limit:
                  type: integer
                  description: 'Значение value должно быть между 1 и 50.'
                  example: 1
                  nullable: true
                page:
                  type: integer
                  description: 'Значение value должно быть не менее 1.'
                  example: 43
                  nullable: true
      security: []
    post:
      summary: 'Создание объявления (multipart: photos[] до 8 шт). Статус — pending.'
