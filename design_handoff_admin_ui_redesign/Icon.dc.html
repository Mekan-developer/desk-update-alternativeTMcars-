<x-dc>
<svg viewBox="0 0 24 24" width="{{ size }}" height="{{ size }}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="flex:none;display:block">
  <sc-for list="{{ shapes }}" as="s" hint-placeholder-count="2">
    <sc-if value="{{ s.isPath }}" hint-placeholder-val="{{ false }}">
      <path d="{{ s.d }}"></path>
    </sc-if>
    <sc-if value="{{ s.isFilledPath }}" hint-placeholder-val="{{ false }}">
      <path d="{{ s.d }}" fill="currentColor" stroke="none"></path>
    </sc-if>
    <sc-if value="{{ s.isCircle }}" hint-placeholder-val="{{ false }}">
      <circle cx="{{ s.cx }}" cy="{{ s.cy }}" r="{{ s.r }}"></circle>
    </sc-if>
    <sc-if value="{{ s.isFilledCircle }}" hint-placeholder-val="{{ false }}">
      <circle cx="{{ s.cx }}" cy="{{ s.cy }}" r="{{ s.r }}" fill="currentColor" stroke="none"></circle>
    </sc-if>
    <sc-if value="{{ s.isRect }}" hint-placeholder-val="{{ false }}">
      <rect x="{{ s.x }}" y="{{ s.y }}" width="{{ s.w }}" height="{{ s.h }}" rx="{{ s.rx }}"></rect>
    </sc-if>
  </sc-for>
</svg>
</x-dc>
